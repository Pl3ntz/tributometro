<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 100" fill="none">
  <!-- Ícone do olho (escala menor) -->
  <g transform="translate(0, 5) scale(0.45)">
    <!-- Olho externo navy -->
    <path d="M100 40 C45 40, 10 100, 10 100 C10 100, 45 160, 100 160 C155 160, 190 100, 190 100 C190 100, 155 40, 100 40 Z" fill="#0F2440"/>
    <!-- Contorno branco -->
    <path d="M100 52 C52 52, 22 100, 22 100 C22 100, 52 148, 100 148 C148 148, 178 100, 178 100 C178 100, 148 52, 100 52 Z" fill="none" stroke="#FFFFFF" stroke-width="3"/>
    <!-- Iris dourada -->
    <circle cx="100" cy="100" r="42" fill="#E5A216"/>
    <!-- Pupila navy -->
    <circle cx="100" cy="100" r="28" fill="#0F2440"/>
    <!-- Barras de gráfico -->
    <rect x="87" y="96" width="6" height="18" rx="1.5" fill="#FFFFFF"/>
    <rect x="97" y="88" width="6" height="26" rx="1.5" fill="#FFFFFF"/>
    <rect x="107" y="82" width="6" height="32" rx="1.5" fill="#FFFFFF"/>
  </g>
  <!-- Texto "Tributô" branco bold -->
  <text x="105" y="55" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="700" fill="#FFFFFF">Tributô</text>
  <!-- Texto "Metro" dourado light -->
  <text x="315" y="55" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="300" fill="#E5A216">Metro</text>
  <!-- Tagline -->
  <text x="105" y="80" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="400" fill="#6B7FA0" letter-spacing="1">Cada centavo exposto</text>
</svg>
