<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#111113"/>
  <!-- Eye shape (transparency symbol) -->
  <ellipse cx="16" cy="16" rx="10" ry="7" fill="none" stroke="#E5A216" stroke-width="1.8"/>
  <!-- Iris -->
  <circle cx="16" cy="16" r="4" fill="#E5A216" opacity="0.9"/>
  <!-- Pupil -->
  <circle cx="16" cy="16" r="1.8" fill="#111113"/>
  <!-- Light reflection -->
  <circle cx="17.5" cy="14.5" r="0.8" fill="#F5B731" opacity="0.8"/>
</svg>
